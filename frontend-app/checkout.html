<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - CariMakanBDG</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #fcfcfc;
      }
      /* Menyesuaikan warna tombol dengan tombol "Cari" di home */
      .btn-brand {
        background-color: #3ba4f6;
        color: white;
        border: none;
        border-radius: 25px; /* Membuat tombol membulat */
        padding: 10px 20px;
        font-weight: 600;
      }
      .btn-brand:hover {
        background-color: #2b8bda;
        color: white;
      }
      .card-custom {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3 mb-5"
    >
      <div class="container">
        <a class="navbar-brand fw-bold text-dark" href="#"
          >CariMakan<span class="text-primary">BDG</span></a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto fw-semibold">
            <li class="nav-item">
              <a class="nav-link text-dark px-3" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark px-3" href="#">Kategori</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark px-3" href="history.html"
                >Histori Pesanan</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container" style="max-width: 650px">
      <h3 class="fw-bold mb-4">Rincian Pesanan</h3>
      <div class="card card-custom">
        <div class="card-body p-4 p-md-5">
          <ul class="list-group list-group-flush mb-4">
            <li
              class="list-group-item d-flex justify-content-between align-items-center border-0 px-0 pb-3"
            >
              <div>
                <h6 class="fw-bold mb-1">Nasi Goreng Spesial</h6>
                <small class="text-muted">Restoran ID: 101</small>
              </div>
              <span class="fw-semibold">Rp 25.000</span>
            </li>
            <li
              class="list-group-item d-flex justify-content-between align-items-center border-0 px-0 pb-3"
            >
              <div>
                <h6 class="fw-bold mb-1">Es Teh Manis</h6>
                <small class="text-muted">Restoran ID: 101</small>
              </div>
              <span class="fw-semibold">Rp 10.000</span>
            </li>
            <li
              class="list-group-item d-flex justify-content-between align-items-center border-top px-0 pt-4 mt-2"
            >
              <span class="fs-5 fw-bold text-dark">Total Pembayaran</span>
              <strong class="fs-5 text-dark">Rp 35.000</strong>
            </li>
          </ul>

          <div id="alertContainer"></div>

          <button class="btn btn-brand w-100 py-3 mt-2" id="btnCheckout">
            Konfirmasi Pesanan
          </button>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/checkout.js"></script>
  </body>
</html>
