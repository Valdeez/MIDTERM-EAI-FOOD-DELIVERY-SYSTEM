<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histori - CariMakanBDG</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #fcfcfc;
      }
      .btn-outline-brand {
        color: #3ba4f6;
        border-color: #3ba4f6;
        border-radius: 20px;
      }
      .btn-outline-brand:hover {
        background-color: #3ba4f6;
        color: white;
      }
      .card-custom {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        overflow: hidden;
      }
      .table > :not(caption) > * > * {
        padding: 1rem 1.5rem; /* Memberi ruang agar tabel tidak sesak */
      }
    </style>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3 mb-5"
    >
      <div class="container">
        <a class="navbar-brand fw-bold text-dark" href="#"
          >CariMakan<span class="text-primary">BDG</span></a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto fw-semibold">
            <li class="nav-item">
              <a class="nav-link text-dark px-3" href="#">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark px-3" href="#">Kategori</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-dark px-3 active" href="#"
                >Histori Pesanan</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <div
        class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4"
      >
        <h3 class="fw-bold mb-3 mb-md-0">Histori Pesanan Saya</h3>
        <button
          class="btn btn-outline-brand btn-sm px-4 py-2"
          onclick="muatDataPesanan()"
        >
          Segarkan Data
        </button>
      </div>

      <div class="card card-custom">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="bg-light text-muted" style="font-size: 0.9rem">
                <tr>
                  <th class="fw-semibold">ID Order</th>
                  <th class="fw-semibold">Restoran</th>
                  <th class="fw-semibold">Total Belanja</th>
                  <th class="fw-semibold">Status</th>
                </tr>
              </thead>
              <tbody id="tabelHistori">
                <tr>
                  <td colspan="4" class="text-center py-5 text-muted">
                    <div
                      class="spinner-border spinner-border-sm text-info me-2"
                      role="status"
                    ></div>
                    Menyinkronkan data...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/history.js"></script>
  </body>
</html>
