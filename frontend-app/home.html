<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CariMakanBDG - Katalog Kuliner Bandung</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #ffffff;
        color: #1a1a1a;
      }
      .navbar {
        background-color: #ffffff;
        border-bottom: 1px solid #f0f0f0;
        padding: 15px 0;
      }

      /* HEADER UTAMA DENGAN GAMBAR */
      .hero-section {
        background:
          linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
          url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1600&q=80");
        background-size: cover;
        background-position: center;
        padding: 120px 0;
        text-align: center;
        color: white;
        border-bottom: 1px solid #f0f0f0;
      }
      .hero-section h1 {
        font-weight: 800;
        text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
      }
      .hero-section p {
        text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.3);
      }

      .search-container {
        max-width: 650px;
        margin: 0 auto;
      }
      .search-input-group {
        background-color: #ffffff;
        border-radius: 50px;
        padding: 5px;
        display: flex;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      .form-control-search {
        border: none;
        box-shadow: none !important;
        padding-left: 20px;
        border-radius: 50px;
      }
      .btn-search {
        background-color: #3498db;
        color: white;
        border-radius: 50px;
        padding: 10px 30px;
        font-weight: 600;
        border: none;
      }

      /* KARTU RESTORAN */
      .card-restaurant {
        border: 1px solid #f0f0f0;
        border-radius: 20px;
        transition: all 0.3s ease;
        background-color: #ffffff;
        overflow: hidden;
        height: 100%;
      }
      .card-restaurant:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      }
      .card-img-container {
        height: 180px;
        overflow: hidden;
      }
      .card-img-top-custom {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
      }
      .card-restaurant:hover .card-img-top-custom {
        transform: scale(1.1);
      }
      .card-body-eatery {
        padding: 18px;
      }
      .badge-status {
        padding: 5px 12px;
        border-radius: 50px;
        font-size: 0.7rem;
        font-weight: 600;
      }
      .restaurant-title {
        font-size: 1.1rem;
        font-weight: 700;
        margin: 10px 0 5px 0;
      }
      .restaurant-address {
        font-size: 0.8rem;
        color: #757575;
        min-height: 40px;
      }
      .btn-detail {
        border-radius: 50px;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 6px 15px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold text-dark" href="home.html"
          >CariMakan<span class="text-primary">BDG</span></a
        >
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link text-dark fw-medium px-3" href="history.html"
                >Histori Pesanan</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="hero-section">
      <div class="container">
        <h1 class="display-5 mb-3">Jelajahi Rasa di Kota Kembang</h1>
        <p class="lead mb-5 fs-6">
          Temukan destinasi kuliner paling hits dan viral di Bandung.
        </p>
        <div class="search-container">
          <form class="input-group search-input-group" id="searchForm">
            <input
              id="searchInput"
              type="text"
              class="form-control-search form-control"
              placeholder="Cari Bubur DPR, Sate Jando, dll..."
            />
            <button class="btn btn-search" type="button">
              <i class="bi bi-search me-2"></i>Cari
            </button>
          </form>
        </div>
      </div>
    </header>

    <main class="container my-5">
      <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="h5 fw-bold m-0">Rekomendasi Restoran</h2>
        <span class="text-muted small">15 Restoran ditemukan</span>
      </div>

      <div class="row" id="restaurant-container"></div>
    </main>

    <footer class="text-center py-5 border-top bg-light">
      <p class="text-muted small">
        &copy; 2026 CariMakanBDG - Katalog Kuliner Bandung
      </p>
    </footer>

    <script src="js/home.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
