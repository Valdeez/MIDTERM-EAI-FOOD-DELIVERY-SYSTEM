
services:
  # 1. Database MySQL
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
  # 2. Layanan API Gateway (Supergraph)
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - order-service
      - restaurant-service
      - payment-service
      - user-service

  # 3. Layanan Order
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3002:3002"
    depends_on:
      - mysql-db

  # 4. Layanan Restaurant
  restaurant-service:
    build: ./restaurant-service
    container_name: restaurant-service
    ports:
      - "3001:3001"
    depends_on:
      - mysql-db

  # 5. Layanan Payment
  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "3003:3003"
    depends_on:
      - mysql-db

  # 6. Layanan User
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3004:3004"
    depends_on:
      - mysql-db

volumes:
  db_data:
