<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Restoran - CariMakanBDG</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background-color: #ffffff;
        color: #1e293b;
      }
      .navbar {
        border-bottom: 1px solid #f1f5f9;
        padding: 15px 0;
      }
      .back-link {
        text-decoration: none;
        color: #64748b;
        font-size: 0.85rem;
        font-weight: 500;
      }
      .detail-img-wrapper {
        width: 100%;
        height: 420px;
        border-radius: 24px;
        overflow: hidden;
        margin-top: 20px;
        background-color: #f8fafc;
      }
      .detail-img-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .menu-item-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px;
        border: 1px solid #f1f5f9;
        border-radius: 16px;
        margin-bottom: 12px;
        transition: all 0.2s;
      }
      .menu-item-card:hover {
        border-color: #3498db;
        background-color: #f8fafc;
      }
      .menu-item-img {
        width: 70px;
        height: 70px;
        border-radius: 12px;
        object-fit: cover;
        background-color: #f1f5f9;
      }
      /* Tambahkan di dalam tag <style> detail.html */
      .menu-description {
        font-size: 0.75rem;
        color: #64748b; /* Warna abu-abu yang soft */
        margin-bottom: 4px;
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2; /* Membatasi maksimal 2 baris agar tetap rapi */
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .qty-picker {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .btn-qty {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        background: white;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn-qty:hover {
        background: #3498db;
        color: white;
      }
      .sidebar-container {
        position: sticky;
        top: 100px;
      }
      .info-card,
      .checkout-box {
        background: #ffffff;
        border: 1px solid #f1f5f9;
        border-radius: 24px;
        padding: 24px;
        margin-bottom: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.02);
      }
      .info-label {
        font-size: 0.65rem;
        text-transform: uppercase;
        font-weight: 700;
        color: #94a3b8;
        letter-spacing: 1px;
        display: block;
        margin-bottom: 5px;
      }
      .info-value {
        font-size: 0.9rem;
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 15px;
        display: block;
      }
      .badge-open {
        background-color: #ecfdf5;
        color: #059669;
        padding: 6px 12px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.7rem;
      }
      .btn-confirm {
        width: 100%;
        padding: 14px;
        border-radius: 50px;
        border: none;
        background: #3498db;
        color: white;
        font-weight: 700;
        margin-top: 15px;
      }
      .btn-confirm:disabled {
        background: #e2e8f0;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <nav class="navbar sticky-top bg-white">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold text-dark" href="home.html"
          >CariMakan<span class="text-primary">BDG</span></a
        >
        <a href="home.html" class="back-link"
          ><i class="bi bi-arrow-left me-1"></i> Kembali</a
        >
      </div>
    </nav>

    <div class="container pb-5">
      <div class="row">
        <div class="col-lg-8">
          <div class="detail-img-wrapper">
            <img id="resto-image" src="" alt="Loading..." />
          </div>

          <h1
            id="resto-name"
            class="fw-800 mt-4"
            style="font-size: 2.2rem; letter-spacing: -1px"
          >
            Memuat Restoran...
          </h1>
          <p
            id="resto-description"
            class="text-muted mt-3"
            style="font-size: 0.95rem; line-height: 1.8"
          ></p>

          <h5 class="fw-bold mt-5 mb-4">Daftar Menu Favorit</h5>
          <div id="menu-items"></div>
        </div>

        <div class="col-lg-4 mt-lg-0 mt-5">
          <div class="sidebar-container">
            <div class="info-card">
              <div
                class="d-flex justify-content-between align-items-center mb-4"
              >
                <span class="badge-open">BUKA SEKARANG</span>
                <div class="text-warning small">
                  <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i
                  ><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i
                  ><i class="bi bi-star-fill"></i>
                </div>
              </div>
              <span class="info-label">Alamat Lengkap</span>
              <span id="resto-address" class="info-value">-</span>
              <span class="info-label">Jam Operasional</span>
              <span id="resto-hours" class="info-value mb-0">-</span>
            </div>

            <div class="checkout-box">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h6 class="fw-bold m-0">Pesanan Kamu</h6>
                <span class="badge bg-light text-dark fw-bold" id="item-count"
                  >0 Item</span
                >
              </div>
              <div id="cart-list" class="mb-3">
                <div class="text-center py-3 text-muted small">
                  Belum ada menu dipilih
                </div>
              </div>
              <div class="border-top pt-3">
                <div class="d-flex justify-content-between mb-2 small">
                  <span class="text-muted">Subtotal</span>
                  <span id="subtotal" class="fw-bold">Rp 0</span>
                </div>
                <div class="d-flex justify-content-between small">
                  <span class="text-muted">Biaya Layanan</span>
                  <span id="fee" class="fw-bold">Rp 0</span>
                </div>
                <div
                  class="d-flex justify-content-between mt-3 pt-3 border-top"
                >
                  <span class="fw-bold">Total</span>
                  <span id="total" class="fw-bold text-primary fs-5">Rp 0</span>
                </div>
              </div>
              <button
                id="btn-confirm"
                class="btn-confirm"
                disabled
                onclick="handleCheckout()"
              >
                Konfirmasi Pesanan
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/detail.js"></script>
  </body>
</html>
