<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Histori - CariMakanBDG</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8f9fa;
      }
      .btn-outline-brand {
        color: #3ba4f6;
        border-color: #3ba4f6;
        border-radius: 20px;
        font-weight: 500;
      }
      .btn-outline-brand:hover {
        background-color: #3ba4f6;
        color: white;
      }
      .card-custom {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        overflow: hidden;
      }
      .table > :not(caption) > * > * {
        padding: 1.2rem 1.5rem;
        vertical-align: middle;
      }
      /* Styling untuk Modal */
      .modal-content {
        border-radius: 20px;
        border: none;
      }
      .modal-header {
        border-bottom: 1px solid #f1f5f9;
        padding: 1.5rem 1.5rem 1rem;
      }
      .modal-body {
        padding: 1.5rem;
      }
    </style>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3 mb-5 sticky-top"
    >
      <div class="container">
        <a class="navbar-brand fw-bold text-dark" href="home.html"
          >CariMakan<span class="text-primary">BDG</span></a
        >
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto fw-semibold">
            <li class="nav-item">
              <a class="nav-link text-dark px-3" href="home.html">Home</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container pb-5">
      <div
        class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4"
      >
        <div>
          <h3 class="fw-bold mb-1">Histori Pesanan</h3>
          <p class="text-muted small">
            Pantau status dan detail pesanan kamu di sini.
          </p>
        </div>
        <button
          class="btn btn-outline-brand btn-sm px-4 py-2 mt-3 mt-md-0 shadow-sm"
          onclick="muatDataPesanan()"
        >
          <i class="bi bi-arrow-clockwise me-1"></i> Segarkan Data
        </button>
      </div>

      <div class="card card-custom">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead
                class="bg-light text-muted"
                style="
                  font-size: 0.85rem;
                  text-transform: uppercase;
                  letter-spacing: 0.5px;
                "
              >
                <tr>
                  <th class="fw-bold ps-4">ID Order</th>
                  <th class="fw-bold">Restoran</th>
                  <th class="fw-bold">Total Belanja</th>
                  <th class="fw-bold">Status</th>
                  <th class="fw-bold text-center pe-4">Aksi</th>
                </tr>
              </thead>
              <tbody id="tabelHistori">
                <tr>
                  <td colspan="5" class="text-center py-5 text-muted">
                    <div
                      class="spinner-border spinner-border-sm text-primary me-2"
                      role="status"
                    ></div>
                    Menyinkronkan data dari database...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg">
          <div class="modal-header">
            <h5 class="modal-title fw-bold">Detail Pesanan</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body" id="modal-body-content"></div>
          <div class="modal-footer border-0">
            <button
              type="button"
              class="btn btn-light rounded-pill px-4 fw-semibold"
              data-bs-dismiss="modal"
            >
              Tutup
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/history.js"></script>
  </body>
</html>
